apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "resource-monitoring-app.fullname" . }}-test-connection"
  labels:
    {{- include "resource-monitoring-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args: ['{{ include "resource-monitoring-app.name" . }}-service:{{ .Values.app.service.port }}']
  restartPolicy: Never
